services:
  # Deno 2.6.0 (first version with stmt.columns - minimum supported)
  test-deno-2.6:
    build:
      context: .
      dockerfile: Dockerfile.deno
      args:
        DENO_VERSION: "2.6.0"
    working_dir: /app
    command: deno run -A npm:vitest run --config vitest.config.deno.ts

  # Deno 2.7.2 (current target)
  test-deno-2.7:
    build:
      context: .
      dockerfile: Dockerfile.deno
      args:
        DENO_VERSION: "2.7.2"
    working_dir: /app
    command: deno run -A npm:vitest run --config vitest.config.deno.ts

  # Node tests (Step 1 - importing Drizzle shared test suite)
  test-node22:
    build:
      context: .
      dockerfile: Dockerfile.node
      args:
        NODE_VERSION: 22
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npm test

  test-node24:
    build:
      context: .
      dockerfile: Dockerfile.node
      args:
        NODE_VERSION: 24
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npm test
