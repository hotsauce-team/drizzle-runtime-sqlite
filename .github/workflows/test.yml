name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

  test-deno:
    name: Test Deno ${{ matrix.deno-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deno-version: ["2.6", "2.7.2"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ matrix.deno-version }}-${{ hashFiles('deno.jsonc', 'deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-${{ matrix.deno-version }}-

      - name: Clone Drizzle shared test suite
        run: make clone-repo

      - name: Install dependencies
        run: deno install

      - name: Run tests
        run: deno task test

  test-node:
    name: Test Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clone Drizzle shared test suite
        run: make clone-repo

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
